##############################################################################
# picom — stile macOS (blur menu bar, angoli arrotondati, ombre morbide)
# Gestito per il progetto "tema macOS" di Vanni. Backend glx (richiesto per blur).
##############################################################################

backend = "glx";
vsync = true;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

#### Angoli arrotondati (finestre macOS) ####################################
corner-radius = 22;   # = raggio degli angoli superiori del tema xfwm4 WhiteSur-xhdpi, cos&igrave; top e bottom combaciano
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Xfce4-panel'",   # la menu bar in alto resta a tutta larghezza, niente raggio
  "class_g = 'Plank'",         # il dock disegna il proprio bordo
  "_GTK_FRAME_EXTENTS@:c"      # le app GTK CSD si arrotondano gi&agrave; da sole (no doppio raggio)
];

#### Blur (menu bar traslucida tipo vetro smerigliato) ######################
blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
  "window_type = 'desktop'",
  "class_g = 'Plank'"
];

#### Ombre (drop shadow morbida macOS) ######################################
shadow = true;
shadow-radius = 28;
shadow-opacity = 0.45;
shadow-offset-x = -28;
shadow-offset-y = -10;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Xfce4-panel'",     # niente ombra sotto la menu bar (come macOS)
  "_GTK_FRAME_EXTENTS@:c"        # le app GTK CSD disegnano gi&agrave; la propria ombra
];

#### Dissolvenze morbide ####################################################
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
