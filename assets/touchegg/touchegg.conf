<touchegg>
  <settings>
    <property name="action_execute_threshold">20</property>
    <property name="color">0a84ff</property>
    <property name="borderColor">0a84ff</property>
  </settings>
  <application name="All">
    <!-- 3 dita su: Mission Control -->
    <gesture type="SWIPE" fingers="3" direction="UP">
      <action type="RUN_COMMAND">
        <repeat>false</repeat>
        <command>xfdashboard --toggle</command>
        <on>begin</on>
      </action>
    </gesture>
    <!-- 3 dita gi&ugrave;: mostra/nascondi desktop (toggle) -->
    <gesture type="SWIPE" fingers="3" direction="DOWN">
      <action type="RUN_COMMAND">
        <repeat>false</repeat>
        <command>bash -c 'test "$(xprop -root _NET_SHOWING_DESKTOP | grep -o "[01]$")" = "1" &amp;&amp; wmctrl -k off || wmctrl -k on'</command>
        <on>begin</on>
      </action>
    </gesture>
    <!-- 3 dita sinistra/destra: cambia Space (workspace) -->
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="CHANGE_DESKTOP">
        <direction>next</direction>
        <animate>true</animate>
        <animationPosition>0.25</animationPosition>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="CHANGE_DESKTOP">
        <direction>previous</direction>
        <animate>true</animate>
        <animationPosition>0.25</animationPosition>
      </action>
    </gesture>
  </application>
</touchegg>
